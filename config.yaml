# PoloFinder configuration
# Everything the search cares about lives here. No need to touch the code.

target:
  make: "Volkswagen"
  model: "Polo"

  # Engine you actually want. 1.0 TSI 95PS.
  engine_litres: 1.0
  engine_family: "TSI"          # TSI = turbo. MPI (80PS) is the non-turbo, excluded.
  power_ps: 95
  power_ps_tolerance: 0         # 0 = 95PS only in the EXACT tier

  # "Match or above" - Polo trim hierarchy, see matching.py TRIM_RANK.
  # Post-2021 facelift range is: Polo / Life / Match / Style / R-Line / GTI
  # so Life sits BELOW the cut and is rejected.
  min_trim: "Match"

  # 2021 facelift onward only (Mk6 facelift, "6C"). Cars registered earlier
  # are rejected even if the trim name matches, because pre-facelift Match
  # is a different car.
  min_year: 2021
  min_year_strict: true   # false = pre-2021 Match+ cars drop to WORTH A LOOK instead

budget:
  max_price: 12500              # hard budget for the EXACT tier
  stretch_price: 14000          # STRETCH tier ceiling
  max_mileage: 30000            # hard mileage cap for EXACT
  stretch_mileage: 35000        # STRETCH tier ceiling

exclusions:
  # Insurance write-off categories to reject outright.
  # Cat S/C = structural damage. N/D = non-structural. You asked for S and C;
  # N and D are included by default because they hurt resale just as much.
  write_off_categories: ["S", "C", "N", "D"]
  reject_unknown_provenance: false   # true = also drop listings with no history info
  max_owners: null                   # e.g. 3, or null for no limit
  exclude_keywords:
    - "spares or repair"
    - "non runner"
    - "export only"
    - "trade sale"

# Nice-to-haves. Each adds to the extras score; the report sorts by it.
# weight is arbitrary - bump anything you care more about.
extras:
  rear_camera:        { weight: 10, patterns: ["rear camera", "reversing camera", "rear view camera", "rear-view camera", "reverse camera", "rear parking camera"] }
  parking_sensors:    { weight: 5,  patterns: ["parking sensors", "park assist", "front and rear sensors", "rear sensors", "park pilot"] }
  adaptive_cruise:    { weight: 6,  patterns: ["adaptive cruise", "acc", "radar cruise"] }
  apple_carplay:      { weight: 6,  patterns: ["carplay", "apple carplay", "app-connect", "app connect", "android auto"] }
  sat_nav:            { weight: 5,  patterns: ["sat nav", "satnav", "navigation", "discover nav"] }
  digital_cockpit:    { weight: 5,  patterns: ["digital cockpit", "active info display", "virtual cockpit"] }
  heated_seats:       { weight: 4,  patterns: ["heated seats", "heated front seats"] }
  climate_control:    { weight: 3,  patterns: ["climate control", "air con", "air conditioning", "climatronic"] }
  led_headlights:     { weight: 3,  patterns: ["led headlights", "led head lights", "full led"] }
  blind_spot:         { weight: 4,  patterns: ["blind spot"] }
  keyless:            { weight: 3,  patterns: ["keyless", "kessy"] }
  panoramic_roof:     { weight: 3,  patterns: ["panoramic", "pan roof", "sunroof"] }
  alloys:             { weight: 1,  patterns: ["alloy wheels", "alloys"] }
  dab:                { weight: 1,  patterns: ["dab"] }

# Cars that aren't a 95PS Polo but are close enough to be worth a look.
# These land in the WORTH A LOOK tier.
alternatives:
  - { make: "Volkswagen", model: "Polo",  note: "110PS TSI - same car, more power" }
  - { make: "SEAT",       model: "Ibiza", note: "Same MQB A0 platform + 1.0 TSI engine" }
  - { make: "Skoda",      model: "Fabia", note: "Same platform, usually cheaper" }
  - { make: "Audi",       model: "A1",    note: "Premium sibling, same 1.0 TSI" }
  - { make: "Volkswagen", model: "Golf",  note: "Size up - 1.0 TSI Golf can fall in budget" }

location:
  # Home postcode - used to geocode and show distance to each car.
  postcode: "GL53 0ES"        # Cheltenham
  radius_miles: 200           # search radius; cars beyond this are still shown but flagged
  show_distance: true
  # Cars further than this get a warning in the report (still listed).
  comfortable_drive_miles: 75

sources:
  # respect_robots: true  -> skip any URL the site's robots.txt disallows.
  #                          Blocked sites still appear in the report as deep links.
  # respect_robots: false -> scrape anyway. Your call, your legal footing.
  #                          Expect blocks and CAPTCHAs from CI IP ranges.
  respect_robots: true

  user_agent: "PoloFinder/1.0 (personal car search; +https://github.com/)"
  request_delay_seconds: 3.0
  max_pages_per_site: 5
  timeout_seconds: 45
  headless: true

  enabled:
    ebay: true            # official Browse API - best structured data
    gumtree: true         # sitemap + single-filter pages (robots-compliant)
    autotrader: true      # deep-link only unless respect_robots: false
    motors: true
    cargurus: true
    heycar: true
    cinch: true
    carwow: true
    pistonheads: true
    arnoldclark: true
    evanshalshaw: true
    bigmotoringworld: true
    thecarpeople: true

report:
  max_per_tier: 25
  only_new: false         # true = email only listings not seen before
  archive_to_repo: true

email:
  enabled: true
  # Values come from GitHub Actions secrets - never commit real credentials.
  to: "kieransemail@gmail.com"
  subject_prefix: "[PoloFinder]"
